apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "87.5.1"
    helm:
      values: |
        fullnameOverride: prometheus

        grafana:
          persistence:
            enabled: true
            size: 5Gi
{{- if .Values.storageClassName }}
            storageClassName: {{ .Values.storageClassName | quote }}
{{- end }}
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
          grafana.ini:
            server:
              root_url: "%(protocol)s://%(domain)s/"
              serve_from_sub_path: false
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.loki.svc.cluster.local:3100
              access: proxy
              isDefault: false

        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
{{- if .Values.storageClassName }}
                  storageClassName: {{ .Values.storageClassName | quote }}
{{- end }}
                  resources:
                    requests:
                      storage: 20Gi
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
{{- if .Values.storageClassName }}
                  storageClassName: {{ .Values.storageClassName | quote }}
{{- end }}
                  resources:
                    requests:
                      storage: 2Gi
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

        kubeStateMetrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi

        nodeExporter:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus
  # Grafana's chart keeps its random admin password stable via Helm lookup(),
  # which returns empty under Argo CD (`helm template`, no cluster access) — so
  # each sync would regenerate it and drift from the DB-initialized value. Pin
  # the first-generated password by ignoring the field on sync.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: prometheus-grafana
      namespace: prometheus
      jsonPointers:
        - /data/admin-password
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
