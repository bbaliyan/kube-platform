# ACME DNS-01 issuer using Cloudflare. Requires:
#   1. A Secret named cloudflare-api-token in cert-manager namespace with key api-token.
#   2. Replace the email placeholder below with the Let's Encrypt account email.
# Deliver the API token Secret via SOPS+age before applying.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: platform-issuer
spec:
  acme:
    email: change-me@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: platform-issuer-acme-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
