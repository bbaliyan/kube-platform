# Self-contained secret store for the BYO CA — not shared with argocd-repo-creds
# (a different, unrelated concern). Keeps pki-issuer deployable independently of
# whether Argo CD repo credentials have been set up.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: byo-ca-store
spec:
  provider:
    {{- if eq .Values.secretStoreType "vault" }}
    vault:
      server: {{ .Values.vaultAddr | quote }}
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.vaultRole | quote }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
    {{- else if eq .Values.secretStoreType "aws-ssm" }}
    aws:
      service: ParameterStore
      region: {{ .Values.awsRegion | quote }}
      # No auth block — AWS SDK default credential chain uses the EC2 instance profile.
    {{- else if eq .Values.secretStoreType "azure-keyvault" }}
    azurekv:
      tenantId: {{ .Values.azureTenantId | quote }}
      vaultUrl: {{ .Values.azureKeyVaultUrl | quote }}
      authType: WorkloadIdentity
    {{- end }}
