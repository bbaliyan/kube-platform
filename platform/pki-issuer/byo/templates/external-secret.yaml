apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: byo-ca-tls
  namespace: cert-manager
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: platform-repo-store
    kind: ClusterSecretStore
  target:
    name: byo-ca-tls
    creationPolicy: Owner
    # Retain the CA Secret if this ExternalSecret is ever removed — losing the
    # signing CA would invalidate every cert already issued by this cluster.
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
      engineVersion: v2
      mergePolicy: Replace
      data:
        # cert-manager's CA issuer signs using tls.crt[0] (the signing cert, which
        # must match tls.key) and propagates the remaining chain entries into every
        # issued cert's tls.crt, dropping the self-signed root automatically.
        # Without the chain here, issued certs are leaf-only and clients that trust
        # only the org root CA fail with PartialChain errors.
        tls.crt: "{{ `{{ .cert }}` }}\n{{ `{{ .chain }}` }}"
        tls.key: "{{ `{{ .key }}` }}"
  data:
    {{- if eq .Values.secretStoreType "aws-ssm" }}
    - secretKey: cert
      remoteRef:
        key: {{ .Values.ssmByoCaCertPath | quote }}
        decodingStrategy: None
        nullBytePolicy: Ignore
    - secretKey: chain
      remoteRef:
        key: {{ .Values.ssmByoCaChainPath | quote }}
        decodingStrategy: None
        nullBytePolicy: Ignore
    - secretKey: key
      remoteRef:
        key: {{ .Values.ssmByoCaKeyPath | quote }}
        decodingStrategy: None
        nullBytePolicy: Ignore
    {{- else if eq .Values.secretStoreType "vault" }}
    - secretKey: cert
      remoteRef:
        key: {{ trimPrefix "secret/data/" .Values.vaultByoCaPath | quote }}
        property: cert
    - secretKey: chain
      remoteRef:
        key: {{ trimPrefix "secret/data/" .Values.vaultByoCaPath | quote }}
        property: chain
    - secretKey: key
      remoteRef:
        key: {{ trimPrefix "secret/data/" .Values.vaultByoCaPath | quote }}
        property: key
    {{- else if eq .Values.secretStoreType "azure-keyvault" }}
    - secretKey: cert
      remoteRef:
        key: {{ .Values.azureByoCaCertName | quote }}
    - secretKey: chain
      remoteRef:
        key: {{ .Values.azureByoCaChainName | quote }}
    - secretKey: key
      remoteRef:
        key: {{ .Values.azureByoCaKeyName | quote }}
    {{- end }}
