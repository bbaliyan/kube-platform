# Expects a Secret named byo-ca-tls in the cert-manager namespace containing
# tls.crt (CA certificate PEM) and tls.key (CA private key PEM).
# Deliver this Secret via SOPS+age or External Secrets before applying.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: platform-issuer
spec:
  ca:
    secretName: byo-ca-tls
