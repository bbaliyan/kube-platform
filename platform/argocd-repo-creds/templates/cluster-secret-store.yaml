apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: platform-repo-store
spec:
  provider:
    {{- if eq .Values.secretStoreType "vault" }}
    vault:
      server: {{ .Values.vaultAddr | quote }}
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.vaultRole | quote }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
    {{- else if eq .Values.secretStoreType "aws-ssm" }}
    aws:
      service: ParameterStore
      region: {{ .Values.awsRegion | quote }}
      # No auth block — AWS SDK default credential chain uses the EC2 instance profile.
      # Grant ssm:GetParameter on the parameter path via node_iam_role_name in kube-examples.
    {{- else if eq .Values.secretStoreType "azure-keyvault" }}
    azurekv:
      tenantId: {{ .Values.azureTenantId | quote }}
      vaultUrl: {{ .Values.azureKeyVaultUrl | quote }}
      authType: WorkloadIdentity
    {{- end }}
