apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`headlamp.{{ .Values.clusterFqdnSuffix }}`)
      kind: Rule
      services:
        - name: headlamp
          port: 80
          namespace: headlamp
  tls: {}
