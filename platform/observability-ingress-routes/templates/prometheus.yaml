apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: prometheus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus.{{ .Values.clusterFqdnSuffix }}`)
      kind: Rule
      services:
        - name: prometheus-kube-prometheus-prometheus
          port: 9090
          namespace: prometheus
  tls: {}
