apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: prometheus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.{{ .Values.clusterFqdnSuffix }}`)
      kind: Rule
      services:
        - name: prometheus-grafana
          port: 80
          namespace: prometheus
  tls: {}
