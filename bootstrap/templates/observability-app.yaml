apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: {{ .Values.platformRepoURL }}
    targetRevision: {{ .Values.platformRevision }}
    path: platform/observability
    helm:
      parameters:
        - name: clusterFqdnSuffix
          value: {{ .Values.clusterFqdnSuffix | quote }}
        - name: platformRepoURL
          value: {{ .Values.platformRepoURL | quote }}
        - name: platformRevision
          value: {{ .Values.platformRevision | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
