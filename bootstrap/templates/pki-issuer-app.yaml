apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pki-issuer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: {{ .Values.platformRepoURL }}
    targetRevision: {{ .Values.platformRevision }}
    path: platform/pki-issuer/{{ .Values.certMode }}
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
