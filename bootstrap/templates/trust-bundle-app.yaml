{{- if .Values.trustedCaPemB64 }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trust-bundle
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: {{ .Values.platformRepoURL }}
    targetRevision: {{ .Values.platformRevision }}
    path: platform/trust-bundle
    helm:
      parameters:
        - name: trustedCaPemB64
          value: {{ .Values.trustedCaPemB64 | quote }}
        {{- if eq .Values.certMode "byo" }}
        - name: caChainSecretName
          value: "byo-ca-tls"
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
