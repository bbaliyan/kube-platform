apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      chart: headlamp
      targetRevision: "0.43.0"
      helm:
        values: |
          serviceAccount:
            create: true
            name: headlamp-admin
          clusterRoleBinding:
            create: true
          service:
            type: ClusterIP
            port: 80
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
    - repoURL: {{ .Values.platformRepoURL }}
      targetRevision: {{ .Values.platformRevision }}
      path: platform/headlamp
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
