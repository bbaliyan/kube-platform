apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3s-system
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: {{ .Values.platformRepoURL }}
    targetRevision: {{ .Values.platformRevision }}
    path: platform/k3s-system
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
